state_dir: /tmp/speechmux  # Directory where PID files and the manager PID are written at runtime.

processes:
  - name: vad                              # Unique name; used in status output and PID file names.
    command: .venv/bin/python3             # Relative to working_directory (workspace root).
    args:
      - "-m"
      - "speechmux_plugin_vad.main"
      - "--config"
      - "plugin-vad/config/vad.yaml"       # Socket path and engine are configured inside this file.
    working_directory: "."                 # Workspace root — where make is run and .venv lives.
    restart: on-failure                    # Restart policy: always | on-failure | never.
    startup_delay_ms: 500                  # Wait (ms) after this process starts before launching the next one.

  - name: stt-sherpa                       # sherpa-onnx streaming Zipformer engine.
    command: .venv/bin/python3             # Relative to working_directory (workspace root).
    args:
      - "-m"
      - "speechmux_plugin_stt.main"
      - "--config"
      - "plugin-stt/config/inference-onnx.yaml"  # Socket path and engine configured inside this file.
    working_directory: "."                 # Workspace root.
    restart: on-failure
    startup_delay_ms: 0                    # Starts after VAD due to VAD's startup_delay_ms above.

  - name: core                             # SpeechMux Core — started last, after plugins are ready.
    command: ./core/bin/speechmux-core     # Must be pre-built with 'make build'.
    args:
      - "--config"
      - "core/config/core.yaml"
      - "--plugins"
      - "core/config/plugins.yaml"
    working_directory: "."                 # Workspace root.
    restart: on-failure
    startup_delay_ms: 1000                 # Wait (ms) for plugins to bind their sockets before core starts.
